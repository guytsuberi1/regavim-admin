name: Deploy admin site to GitHub Pages

# מפרסם את admin-site/ לענף gh-pages — GitHub Pages מגיש ממנו את האתר.
# (אותה תבנית כמו regavim-dorm.)
on:
  push:
    branches: [main]
    paths:
      - 'admin-site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: admin-site
          publish_branch: gh-pages
